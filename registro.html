<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear Cuenta | Servicios Ramírez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-color: #000000;
      --accent-color: #e30613; 
      --bg-color: #f5f5f7;
      --text-main: #1d1d1f;
      --text-muted: #86868b;
      --border-color: #e5e5e5;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px 0; }
    a { text-decoration: none; color: var(--accent-color); font-weight: 500; transition: color 0.3s; }
    a:hover { color: #b3000a; }

    /* Contenedor Principal */
    .register-container { 
      background: #fff; width: 100%; max-width: 500px; padding: 40px; 
      border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
      animation: slideUp 0.5s ease-out forwards;
      margin: 20px;
    }
    
    @keyframes slideUp { 
      from { opacity: 0; transform: translateY(20px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    /* Cabecera del form */
    .register-header { text-align: center; margin-bottom: 25px; }
    .register-header img { height: 40px; margin-bottom: 15px; cursor: pointer; }
    .register-header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
    .register-header p { color: var(--text-muted); font-size: 0.95rem; }

    /* Formulario */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    
    .form-group { margin-bottom: 15px; position: relative; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.9rem; color: #333; }
    .form-group input { 
      width: 100%; padding: 12px 15px; border: 1px solid var(--border-color); 
      border-radius: 8px; font-size: 0.95rem; outline: none; transition: all 0.3s; background: #fafafa;
    }
    .form-group input:focus { border-color: var(--accent-color); background: #fff; box-shadow: 0 0 0 3px rgba(227, 6, 19, 0.1); }
    
    /* Mostrar contraseña */
    .toggle-password { 
      position: absolute; right: 15px; top: 35px; background: none; border: none; 
      color: var(--text-muted); cursor: pointer; font-size: 0.85rem; font-weight: 500;
    }

    /* Terminos y condiciones */
    .checkbox-group { display: flex; align-items: flex-start; gap: 10px; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 25px; margin-top: 10px; cursor: pointer; line-height: 1.4; }
    .checkbox-group input { cursor: pointer; width: 16px; height: 16px; accent-color: var(--accent-color); margin-top: 2px; }

    /* Botón */
    .btn-submit { 
      width: 100%; background: var(--primary-color); color: #fff; border: none; 
      padding: 14px; border-radius: 25px; font-size: 1.05rem; font-weight: bold; 
      cursor: pointer; transition: transform 0.2s, background 0.3s; 
    }
    .btn-submit:hover { background: var(--accent-color); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(227, 6, 19, 0.3); }
    
    /* Footer del form */
    .register-footer { text-align: center; margin-top: 25px; font-size: 0.95rem; color: var(--text-muted); padding-top: 20px; border-top: 1px solid var(--border-color); }

    /* Mensajes */
    .mensaje { padding: 10px; border-radius: 6px; font-size: 0.9rem; text-align: center; margin-bottom: 20px; display: none; }
    .error { color: #dc2626; background: #fef2f2; border: 1px solid #fecaca; }
    .exito { color: #16a34a; background: #dcfce7; border: 1px solid #bbf7d0; }

    /* Responsive */
    @media (max-width: 500px) {
      .form-row { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body>

  <div class="register-container">
    <div class="register-header">
      <a href="index.html">
        <img src="logo-opcion4.svg" alt="Servicios Ramírez" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Sony_logo.svg/1200px-Sony_logo.svg.png'" />
      </a>
      <h1>Crea tu cuenta</h1>
      <p>Únete a Servicios Ramírez para guardar tus compras y configuraciones</p>
    </div>

    <!-- Contenedor para mostrar alertas -->
    <div id="mensaje-alerta" class="mensaje"></div>

    <form id="formulario-registro" onsubmit="crearCuenta(event)">
      
      <div class="form-row">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Ej. Nicolás" required>
        </div>
        <div class="form-group">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" placeholder="Ej. Ramírez" required>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="ejemplo@correo.com" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
        <button type="button" class="toggle-password" onclick="mostrarClave('password', this)">Ver</button>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirmar Contraseña</label>
        <input type="password" id="confirm-password" placeholder="Repite tu contraseña" required>
        <button type="button" class="toggle-password" onclick="mostrarClave('confirm-password', this)">Ver</button>
      </div>

      <label class="checkbox-group">
        <input type="checkbox" id="terminos" required>
        <span>He leído y acepto los <a href="#">Términos de Servicio</a> y la <a href="#">Política de Privacidad</a> de Servicios Ramírez.</span>
      </label>

      <button type="submit" class="btn-submit">Crear Cuenta</button>
      
    </form>

    <div class="register-footer">
      ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión aquí</a>
    </div>
  </div>

  <script>
    // 1. Mostrar/Ocultar contraseña (sirve para ambos campos)
    function mostrarClave(inputId, btn) {
      const inputPass = document.getElementById(inputId);
      
      if (inputPass.type === "password") {
        inputPass.type = "text";
        btn.textContent = "Ocultar";
      } else {
        inputPass.type = "password";
        btn.textContent = "Ver";
      }
    }

    // 2. Lógica para Crear Cuenta
    function crearCuenta(evento) {
      evento.preventDefault();
      
      const nombre = document.getElementById("nombre").value.trim();
      const apellido = document.getElementById("apellido").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirm-password").value;
      const alerta = document.getElementById("mensaje-alerta");

      // Resetear alertas
      alerta.style.display = "none";
      alerta.className = "mensaje error";

      // Validaciones
      if (password.length < 6) {
        alerta.textContent = "La contraseña debe tener al menos 6 caracteres.";
        alerta.style.display = "block";
        return;
      }

      if (password !== confirmPassword) {
        alerta.textContent = "Las contraseñas no coinciden.";
        alerta.style.display = "block";
        return;
      }

      // Si todo está bien, simulamos el registro guardando en localStorage
      const nombreCompleto = nombre + " " + apellido;
      localStorage.setItem("usuario", nombreCompleto);

      // Mostramos éxito
      alerta.className = "mensaje exito";
      alerta.textContent = "¡Cuenta creada con éxito! Redirigiendo...";
      alerta.style.display = "block";

      // Redirigir al perfil después de 1 segundo y medio
      setTimeout(() => {
        window.location.href = "perfil.html";
      }, 1500);
    }

    // 3. Prevenir que logueados entren al registro
    document.addEventListener("DOMContentLoaded", () => {
      if(localStorage.getItem('usuario')) {
        window.location.href = "perfil.html"; 
      }
    });
  </script>

</body>
</html>
